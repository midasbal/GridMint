<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7F3"/>
      <stop offset="100%" stop-color="#9B8CFF"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#6EE7F3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon ring -->
  <polygon points="100,14 175,57 175,143 100,186 25,143 25,57"
    stroke="url(#gA)" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Middle hexagon -->
  <polygon points="100,34 157,67 157,133 100,166 43,133 43,67"
    stroke="url(#gA)" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Grid dot matrix — 5x5 inside hex area -->
  <g opacity="0.25" fill="#6EE7F3">
    <circle cx="70" cy="78" r="2"/><circle cx="85" cy="78" r="2"/><circle cx="100" cy="78" r="2"/><circle cx="115" cy="78" r="2"/><circle cx="130" cy="78" r="2"/>
    <circle cx="62" cy="93" r="2"/><circle cx="77" cy="93" r="2"/><circle cx="92" cy="93" r="2"/><circle cx="108" cy="93" r="2"/><circle cx="123" cy="93" r="2"/><circle cx="138" cy="93" r="2"/>
    <circle cx="70" cy="108" r="2"/><circle cx="85" cy="108" r="2"/><circle cx="100" cy="108" r="2"/><circle cx="115" cy="108" r="2"/><circle cx="130" cy="108" r="2"/>
    <circle cx="62" cy="122" r="2"/><circle cx="77" cy="122" r="2"/><circle cx="92" cy="122" r="2"/><circle cx="108" cy="122" r="2"/><circle cx="123" cy="122" r="2"/><circle cx="138" cy="122" r="2"/>
  </g>

  <!-- Connection lines (node graph) -->
  <g stroke="#9B8CFF" stroke-width="1" opacity="0.3">
    <line x1="70" y1="78" x2="100" y2="78"/>
    <line x1="100" y1="78" x2="130" y2="78"/>
    <line x1="62" y1="93" x2="92" y2="93"/>
    <line x1="108" y1="93" x2="138" y2="93"/>
    <line x1="70" y1="108" x2="100" y2="108"/>
    <line x1="85" y1="78" x2="77" y2="93"/>
    <line x1="115" y1="78" x2="123" y2="93"/>
    <line x1="92" y1="93" x2="85" y2="108"/>
    <line x1="108" y1="93" x2="115" y2="108"/>
    <line x1="85" y1="108" x2="77" y2="122"/>
    <line x1="115" y1="108" x2="123" y2="122"/>
  </g>

  <!-- Central lightning bolt (energy) -->
  <g filter="url(#softglow)">
    <polygon points="107,62 90,102 99,102 93,138 113,95 103,95 118,62"
      fill="url(#gB)" opacity="0.95"/>
  </g>

  <!-- Outer node highlights on hexagon vertices -->
  <g filter="url(#glow)">
    <circle cx="100" cy="14" r="3.5" fill="#6EE7F3" opacity="0.8"/>
    <circle cx="175" cy="57" r="3.5" fill="#9B8CFF" opacity="0.8"/>
    <circle cx="175" cy="143" r="3.5" fill="#6EE7F3" opacity="0.8"/>
    <circle cx="100" cy="186" r="3.5" fill="#4ade80" opacity="0.8"/>
    <circle cx="25" cy="143" r="3.5" fill="#9B8CFF" opacity="0.8"/>
    <circle cx="25" cy="57" r="3.5" fill="#6EE7F3" opacity="0.8"/>
  </g>

  <!-- Subtle arc sweep at bottom — blockchain ring suggestion -->
  <path d="M 52 160 A 58 58 0 0 0 148 160" stroke="url(#gA)" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4 3"/>
</svg>
